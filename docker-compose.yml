version: "3.9"

# ──────────────────────────────────────────────────────────────
# Construction CV Pipeline  —  docker-compose.yml
#
# Services:
#   postgres          → database
#   zookeeper + kafka → message bus
#   cv_service        → video processing + detection
#   analytics_service → Kafka consumer, writes summaries
#   api_service       → FastAPI REST + frontend
#
# Quick start:
#   cp .env.example .env        # fill in your secrets
#   docker compose up --build
# ──────────────────────────────────────────────────────────────

networks:
  pipeline-net:
    driver: bridge

volumes:
  postgres_data:
  kafka_data:
  equipment_data:
  model_weights:

services:

  # ── Zookeeper ────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    networks: [pipeline-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    healthcheck:
      test:     ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Kafka ─────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    networks: [pipeline-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
      KAFKA_LOG_RETENTION_HOURS:              24
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:     ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout:  10s
      retries:  10

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: postgres
    networks: [pipeline-net]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       ${DB_NAME:-construction_cv}
      POSTGRES_USER:     ${DB_USER:-cvuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cvpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${DB_USER:-cvuser} -d ${DB_NAME:-construction_cv}"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Alembic migrations (runs once then exits) ─────────────────
  migrate:
    build:
      context:    .
      dockerfile: Dockerfile
      target:     base
    container_name: migrate
    networks: [pipeline-net]
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  # ── CV Service ────────────────────────────────────────────────
  cv_service:
    build:
      context:    .
      dockerfile: Dockerfile
      target:     cv                      # uses the cv stage with ffmpeg
    container_name: cv_service
    networks: [pipeline-net]
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DB_HOST: postgres
      DB_PORT: "5432"
    volumes:
      - equipment_data:/data
      - model_weights:/weights
    restart: unless-stopped

  # ── Analytics Service ─────────────────────────────────────────
  analytics_service:
    build:
      context:    .
      dockerfile: Dockerfile
      target:     analytics
    container_name: analytics_service
    networks: [pipeline-net]
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DB_HOST: postgres
      DB_PORT: "5432"
    restart: unless-stopped

  # ── API Service ───────────────────────────────────────────────
  api_service:
    build:
      context:    .
      dockerfile: Dockerfile
      target:     api
    container_name: api_service
    networks: [pipeline-net]
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - model_weights:/weights
    restart: unless-stopped
